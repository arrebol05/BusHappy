services:
  - type: web
    name: bushappy-api
    env: python
    region: singapore  # Hoặc oregon, frankfurt tùy vị trí
    buildCommand: |
      pip install -r requirements.txt
      cd data_preprocessing && python generate_gtfs.py && cd ..
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: BUSHAPPY_ENV
        value: production  # Hoặc sandbox
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free  # Hoặc starter, standard
